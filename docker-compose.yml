services:
  file-server:
    build: ./servers/file-server
    volumes:
      - file_workspace:/app/workspace

  weather-server:
    build: ./servers/weather-server

  calculator-server:
    build: ./servers/calculator-server

  db-server:
    build: ./servers/db-server

  memory-server:
    build: ./servers/memory-server
    env_file:
      - path: ./backend/.env
        required: false
    volumes:
      - ./servers/memory-server/chroma_data:/app/chroma_data

  backend:
    build: ./backend
    ports: ["127.0.0.1:8000:8000"]
    depends_on: [file-server, weather-server, calculator-server, db-server, memory-server]
    env_file:
      - path: ./backend/.env
        required: false
    environment:
      FILE_SERVER_URL: http://file-server:8001
      WEATHER_SERVER_URL: http://weather-server:8002
      CALCULATOR_SERVER_URL: http://calculator-server:8003
      DATABASE_SERVER_URL: http://db-server:8004
      MEMORY_SERVER_URL: http://memory-server:8005

volumes:
  file_workspace:
